name: generate animation

on:
  # Din mein ek baar aadhi raat ko automatic run hoga
  schedule:
    - cron: "0 0 * * *" 
  
  # Aap ise manually bhi run kar sakte hain
  workflow_dispatch:
  
  # Jab bhi master/main branch par push hoga, tab run hoga
  push:
    branches:
    - main
    - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Aapke github user (@SHIWANK72) ke contributions read karega aur snake generate karega
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif

      # Generated files ko 'output' branch mein push karega
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: GitHub Metrics

on:

  schedule:

    - cron: "0 3 * * *"

  push:

    paths:

      - ".github/workflows/metrics.yml"

  workflow_dispatch:

jobs:

  metrics:

    runs-on: ubuntu-latest

    permissions:

      contents: write

    steps:

      - uses: lowlighter/metrics@latest

        with:

          filename: github-metrics.svg

          token: ${{ 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 }}

          user: SHIWANK72

          template: classic

          base: header, activity, community, repositories, metadata

          config_timezone: Asia/Kolkata

          config_display: large

          config_animations: yes

          config_padding: 24, 8 + 11%

          plugin_languages: yes

          plugin_languages_indepth: yes

          plugin_languages_analysis_timeout: 45

          plugin_languages_analysis_timeout_repositories: 20

          plugin_languages_categories: markup, programming

          plugin_languages_limit: 8

          plugin_languages_threshold: 2%

          plugin_languages_colors: github

          plugin_languages_details: percentage

          extras_css: |

            :root {

              --color-scheme: dark;

              --color-content-background: #0d1117;

              --color-background: #0d1117;

              --color-title: #00e5ff;

              --color-icons: #00e5ff;

              --color-text: #c9d1d9;

              --color-text-secondary: #4a9eba;

              --color-border: #161b22;

              --color-shadow: transparent;

              --font-family-title: 'Segoe UI', sans-serif;

              --font-family-text: 'Segoe UI', sans-serif;

            }

            .card {

              border-radius: 12px;

            }

            .large {

              font-weight: 600;

            }
